apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-checkpoint-config
  labels:
    app: agent-checkpoint-demo
data:
  # Path inside the container where the PVC is mounted.
  # Four slashes: sqlite:// (scheme) + //data/... (absolute path).
  CHECKPOINT_DB: "sqlite:////data/checkpoints/demo_run.db"
  RUN_ID: "demo-run-001"
